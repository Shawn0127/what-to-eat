<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What2Eat V3.0 Beta Rebuild</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
<div class="map-area">
  <div id="locationText" class="top-search">📍 取得位置中...</div>
  <div id="map"></div>
</div>

<div class="sheet">
<div class="handle"></div>
<h1>🍜 今天吃什麼</h1>

<h3>熱門美食</h3>
<div class="tags">
<button class="tag" data-query="拉麵">🍜 拉麵</button>
<button class="tag" data-query="火鍋">🍲 火鍋</button>
<button class="tag" data-query="燒肉">🍖 燒肉</button>
<button class="tag" data-query="早餐">🍳 早餐</button>
<button class="tag" data-query="早午餐">🥞 早午餐</button>
<button class="tag" data-query="咖啡廳">☕ 咖啡廳</button>
<button class="tag" data-query="甜點">🍰 甜點</button>
<button class="tag" data-query="牛肉麵">🍜 牛肉麵</button>
<button class="tag" data-query="義大利麵">🍝 義大利麵</button>
<button class="tag" data-query="漢堡">🍔 漢堡</button>
<button class="tag" data-query="披薩">🍕 披薩</button>
<button class="tag" data-query="炸雞">🍗 炸雞</button>
<button class="tag" data-query="水餃">🥟 水餃</button>
<button class="tag" data-query="滷肉飯">🍚 滷肉飯</button>
<button class="tag" data-query="便當">🍱 便當</button>
<button class="tag" data-query="丼飯">🍛 丼飯</button>
<button class="tag" data-query="壽司">🍣 壽司</button>
<button class="tag" data-query="咖哩">🍛 咖哩</button>
<button class="tag" data-query="牛排">🥩 牛排</button>
<button class="tag" data-query="飲料">🧋 飲料</button>
</div>

<label>搜尋半徑 <span id="distanceText">1.5 km</span></label>
<input type="range" id="distance" min="200" max="5000" value="1500">

<label>最低評分 <span id="ratingText">4.0 ★</span></label>
<input type="range" id="rating" min="3" max="5" step="0.5" value="4">

<label>最低評論數 <span id="reviewText">100</span></label>
<input type="range" id="reviews" min="0" max="1000" step="100" value="100">

<button id="searchBtn" class="primary">🔍 搜尋餐廳</button>
<button id="randomBtn" class="secondary">🎡 幫我決定</button>

<div id="restaurantList"></div>
</div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA1Td2MwrEz6rwSJehaRmlSDwJ5ppIvj3A&libraries=places"></script>
<script src="app.js"></script>
</body>
</html>
