<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What2Eat V1.0B</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="map-area">
  <div id="locationText" class="top-search">📍 取得位置中...</div>
  <div id="map"></div>
</div>

<div class="sheet">
  <div class="handle"></div>
  <h1>今天吃什麼</h1>

  <label>距離 <span id="distanceText">1.5 km</span></label>
  <input type="range" id="distance" min="200" max="5000" value="1500">

  <label>最低評分 <span id="ratingText">4.0 ★</span></label>
  <input type="range" id="rating" min="3" max="5" step="0.5" value="4">

  <label>最低評論數 <span id="reviewText">100</span></label>
  <input type="range" id="reviews" min="0" max="1000" step="100" value="100">

  <button id="searchBtn">🔍 搜尋附近餐廳</button>

  <div id="restaurantList"></div>
</div>

<!-- 換成你的 API Key -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA1Td2MwrEz6rwSJehaRmlSDwJ5ppIvj3A&libraries=places"></script>
<script src="app.js"></script>

</body>
</html>
